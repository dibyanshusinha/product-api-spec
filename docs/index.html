<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product API Docs</title>
    <link rel="stylesheet" href="./swagger-ui/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        background: #f7f7f7;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="./swagger-ui/swagger-ui-bundle.js"></script>
    <script src="./swagger-ui/swagger-ui-standalone-preset.js"></script>
    <script>
      const config = new URLSearchParams(window.location.search);
      const specUrl = config.get("url") || "../openapi.yaml";
      const useRuntimeServer = config.get("runtimeServer") === "true";

      const designTimeServers = `servers:
  - url: "{scheme}://{host}:{port}{basePath}"
    description: Target API server for Swagger UI try-it-out.
    variables:
      scheme:
        default: http
        enum:
          - http
          - https
      host:
        default: localhost
      port:
        default: "8080"
      basePath:
        default: /
`;

      function runtimeBaseUrl() {
        const apiDocsPath = "/api_docs";
        const apiDocsIndex = window.location.pathname.indexOf(apiDocsPath);
        const contextPath = apiDocsIndex > 0 ? window.location.pathname.slice(0, apiDocsIndex) : "";
        return `${window.location.origin}${contextPath}`;
      }

      async function resolveSpecUrl() {
        if (!useRuntimeServer) {
          return specUrl;
        }

        const response = await fetch(specUrl);
        const contract = await response.text();
        const runtimeServers = `servers:
  - url: "${runtimeBaseUrl()}"
    description: Running API server.
`;
        const runtimeContract = contract.replace(designTimeServers, runtimeServers);
        return URL.createObjectURL(new Blob([runtimeContract], { type: "application/yaml" }));
      }

      resolveSpecUrl().then((resolvedSpecUrl) => {
        window.ui = SwaggerUIBundle({
          url: resolvedSpecUrl,
          dom_id: "#swagger-ui",
          deepLinking: true,
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset
          ],
          layout: "BaseLayout"
        });
      });
    </script>
  </body>
</html>
