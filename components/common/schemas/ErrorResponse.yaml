ErrorResponse:
  type: object
  additionalProperties: false
  required:
    - title
    - status
    - detail
    - path
    - correlationId
  properties:
    type:
      type: string
      format: uri
      default: about:blank
    title:
      type: string
      example: Invalid request
    status:
      type: integer
      minimum: 100
      maximum: 599
      example: 400
    detail:
      type: string
      example: Request validation failed.
    path:
      type: string
      example: /v1/products
    correlationId:
      type: string
      example: gateway-correlation-123
    errors:
      type: object
      additionalProperties:
        type: string
      example:
        name: must not be blank
