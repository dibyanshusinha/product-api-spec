ProductCreated:
  description: Product created
  headers:
    X-Correlation-Id:
      $ref: '../../components/common/headers.yaml#/CorrelationId'
    Location:
      description: Created product resource location.
      schema:
        type: string
        format: uri-reference
        example: /v1/products/42
  content:
    application/json:
      schema:
        $ref: '../../components/products/schemas.yaml#/ProductResponse'
ProductList:
  description: Paged products returned
  headers:
    X-Correlation-Id:
      $ref: '../../components/common/headers.yaml#/CorrelationId'
  content:
    application/json:
      schema:
        $ref: '../../components/products/schemas.yaml#/ProductPage'
ProductReturned:
  description: Product returned
  headers:
    X-Correlation-Id:
      $ref: '../../components/common/headers.yaml#/CorrelationId'
  content:
    application/json:
      schema:
        $ref: '../../components/products/schemas.yaml#/ProductResponse'
ProductDeleted:
  description: Product deleted
  headers:
    X-Correlation-Id:
      $ref: '../../components/common/headers.yaml#/CorrelationId'
