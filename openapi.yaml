openapi: 3.0.3
info:
  title: API Service
  description: Production-minded REST API contract for managing products, including validation, schema definitions, and token-based pagination.
  version: 1.0.0
  contact:
    name: Product API Team
    email: api-support@example.com
servers:
  - url: "{scheme}://{host}:{port}{basePath}"
    description: Target API server for Swagger UI try-it-out.
    variables:
      scheme:
        default: http
        enum:
          - http
          - https
      host:
        default: localhost
      port:
        default: "8080"
      basePath:
        default: /
security:
  - bearerAuth: []
tags:
  - name: Products
    description: Operations related to products management
paths:
  /v1/products:
    $ref: './paths/products.yaml#/ProductsCollection'
  /v1/products/{productId}:
    $ref: './paths/products.yaml#/ProductResource'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Use Bearer JWT token to access endpoints.
